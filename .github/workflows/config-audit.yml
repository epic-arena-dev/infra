name: Config Audit

on:
  pull_request:
    branches: [ main ]

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run audit
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('child_process');
            const fs = require('fs');
            const pr = context.payload.pull_request;
            const base = pr.base.sha;
            const head = context.sha;
            let changed;
            try {
              changed = execSync(`git diff --name-only ${base} ${head}`, {encoding: 'utf8'}).trim();
            } catch (e) { changed = ''; }

            // Check 1: real credentials in config files
            const configs = changed.split('\n').filter(f => /\.yaml$|\.env$|config\.json$/.test(f));
            if (configs.length > 0) {
              for (const f of configs) {
                if (!fs.existsSync(f)) continue;
                const content = fs.readFileSync(f, 'utf8');
                if (/(app_id|app_secret|api_key|password|token)\s*[:=]\s*['\"][a-zA-Z0-9]{20,}/.test(content)) {
                  core.setFailed('FORBIDDEN: Possible real credential in ' + f);
                  return;
                }
              }
              console.log('Config files reviewed: ' + configs.join(', '));
            }

            // Check 2: .workbuddy config
            if (/\.workbuddy\//.test(changed)) {
              core.setFailed('FORBIDDEN: .workbuddy/ config must NEVER be committed');
            }
