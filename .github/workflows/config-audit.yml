name: Config Audit

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  pull-requests: read

jobs:
  audit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files via GitHub API
        id: changed
        run: |
          FILES=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files" \
            | python3 -c "import sys,json; print('\n'.join([f['filename'] for f in json.load(sys.stdin)]))" 2>/dev/null || echo "")
          echo "CHANGED_FILES<<EOF" >> $GITHUB_ENV
          echo "$FILES" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Check for real credentials in config files
        run: |
          CONFIGS=$(echo "$CHANGED_FILES" | grep -E '(CONFIG\.yaml|\.env|config\.json)$' || true)
          if [ -n "$CONFIGS" ]; then
            for f in $CONFIGS; do
              if grep -qE '(app_id|app_secret|api_key|password|token)\s*[:=]\s*["'][a-zA-Z0-9]{20,}' "$f" 2>/dev/null; then
                echo "::error::FORBIDDEN: Possible real credential in $f"
                exit 1
              fi
            done
            echo "Config files reviewed: $CONFIGS"
          fi

      - name: Check for workbuddy config
        run: |
          WB=$(echo "$CHANGED_FILES" | grep -E '\.workbuddy/' || true)
          if [ -n "$WB" ]; then
            echo "::error::FORBIDDEN: .workbuddy/ config must NEVER be committed"
            exit 1
          fi
