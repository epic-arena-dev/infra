name: Secret Scanning

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run GitLeaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check for sensitive files
        run: |
          CHANGED=$(git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.sha }} 2>/dev/null || echo "")
          SENSITIVE=$(echo "$CHANGED" | grep -E '\.(pem|key|p12|pfx|cer|crt)$' || true)
          if [ -n "$SENSITIVE" ]; then
            echo "::error::FORBIDDEN: Sensitive file detected: $SENSITIVE"
            exit 1
          fi

      - name: Check for hardcoded secrets
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            SUSPICIOUS=$(git diff -U0 ${{ github.event.pull_request.base.sha }} ${{ github.sha }} | grep -E '^(\+.*)(API_KEY|SECRET|PASSWORD|TOKEN|PRIVATE_KEY)\s*[:=]' || true)
            if [ -n "$SUSPICIOUS" ]; then
              echo "::warning::Possible hardcoded secret detected (manual review required):"
              echo "$SUSPICIOUS"
            fi
          fi
