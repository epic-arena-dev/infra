name: Secret Scanning

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run secret scan
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('child_process');
            const pr = context.payload.pull_request;
            const base = pr.base.sha;
            const head = context.sha;
            let changed;
            try {
              changed = execSync(`git diff --name-only ${base} ${head}`, {encoding: 'utf8'}).trim();
            } catch (e) { changed = ''; }

            // Check sensitive files
            const sensitive = changed.split('\n').filter(f => /\.(pem|key|p12|pfx|cer|crt)$/.test(f));
            if (sensitive.length > 0) {
              core.setFailed('FORBIDDEN: Sensitive file detected: ' + sensitive.join(', '));
              return;
            }

            // Check hardcoded secrets
            let diff;
            try {
              diff = execSync(`git diff -U0 ${base} ${head}`, {encoding: 'utf8'}).trim();
            } catch (e) { diff = ''; }
            const suspicious = diff.split('\n').filter(l => /^\+/.test(l) && /(API_KEY|SECRET|PASSWORD|TOKEN|PRIVATE_KEY)\s*[:=]/.test(l));
            if (suspicious.length > 0) {
              core.warning('Possible hardcoded secret detected: ' + suspicious.slice(0, 3).join(' '));
            }
